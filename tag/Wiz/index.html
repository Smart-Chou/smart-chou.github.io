(function () {
            try {
                const applyThemeImmediately = () => {
                    // 立即从 localStorage 读取主题偏好
                    const savedTheme = localStorage.getItem("preferredTheme");
                    const systemDark = window.matchMedia(
                        "(prefers-color-scheme: dark)",
                    ).matches;
                    const isDark =
                        savedTheme === "dark" ||
                        (savedTheme === null && systemDark);
                    const targetTheme = isDark ? "dark" : "light";

                    const root = document.documentElement;
                    const currentTheme = root.getAttribute("data-theme");

                    // 如果主题已经正确设置，跳过更新以避免闪烁
                    if (
                        currentTheme === targetTheme &&
                        root.classList.contains("dark") === isDark
                    ) {
                        return;
                    }

                    // 临时禁用过渡以防止闪烁
                    root.classList.add("theme-no-transition");

                    if (isDark) {
                        root.classList.add("dark");
                        root.setAttribute("data-theme", "dark");
                    } else {
                        root.classList.remove("dark");
                        root.setAttribute("data-theme", "light");
                    }

                    // 强制重绘
                    void root.offsetHeight;

                    // 在下一帧恢复过渡，确保主题已应用
                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            root.classList.remove("theme-no-transition");

                            // 更新主题切换按钮状态（如果存在）
                            try {
                                const themeBtn =
                                    document.getElementById("theme-btn");
                                if (themeBtn) {
                                    themeBtn.setAttribute(
                                        "data-theme",
                                        targetTheme,
                                    );
                                }
                            } catch (e) {
                                // 静默失败
                                console.debug("主题按钮更新失败:", e);
                            }

                            // 标记主题已就绪，供其他组件使用
                            root.classList.add("theme-ready");
                        });
                    });
                };

                // 检查和修复 post-title 布局
                const fixPostTitleLayout = () => {
                    requestAnimationFrame(() => {
                        const postTitles =
                            document.querySelectorAll(".post-title");
                        postTitles.forEach((title) => {
                            // 强制重新计算布局
                            void title.offsetHeight;

                            // 检查是否居中
                            const computedStyle =
                                window.getComputedStyle(title);
                            const marginLeft = computedStyle.marginLeft;
                            const marginRight = computedStyle.marginRight;

                            // 如果边距不是 auto，强制设置为 auto
                            if (
                                marginLeft !== "auto" ||
                                marginRight !== "auto"
                            ) {
                                title.style.marginLeft = "auto";
                                title.style.marginRight = "auto";
                            }

                            // 确保最大宽度正确
                            if (computedStyle.maxWidth !== "860px") {
                                title.style.maxWidth = "860px";
                            }
                        });
                    });
                };

                // 初始应用 - 在 CSS 解析前设置主题
                applyThemeImmediately();

                // 初始修复 post-title 布局
                fixPostTitleLayout();

                // 监听页面加载和交换事件，确保主题正确应用
                if (typeof document !== "undefined") {
                    // View Transitions 页面交换后
                    document.addEventListener("astro:after-swap", () => {
                        applyThemeImmediately();
                        fixPostTitleLayout();
                    });
                    // 常规页面加载（包括 SPA 导航）
                    document.addEventListener("astro:page-load", () => {
                        applyThemeImmediately();
                        fixPostTitleLayout();
                    });
                }

                // 页面加载完成后启用过渡效果
                const enableTransitions = () => {
                    document.documentElement.classList.add(
                        "theme-transitions-enabled",
                    );
                    // DOM 加载完成后再次检查布局
                    fixPostTitleLayout();
                };

                if (document.readyState === "loading") {
                    document.addEventListener(
                        "DOMContentLoaded",
                        enableTransitions,
                    );
                } else {
                    enableTransitions();
                }

                // 在页面完全加载后最后检查一次
                window.addEventListener("load", () => {
                    requestAnimationFrame(() => {
                        fixPostTitleLayout();
                    });
                });
            } catch (e) {
                // 静默失败，后续脚本会处理
                console.debug("主题快速设置失败:", e);
            }
        })();

(function () {
        const STORAGE_KEY = "preferredTheme";

        const getStoredTheme = () => {
            if (typeof localStorage === "undefined") return null;
            return localStorage.getItem(STORAGE_KEY);
        };

        const getSystemTheme = () => {
            return window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
        };

        const getCurrentTheme = () => {
            return getStoredTheme() || getSystemTheme();
        };

        const setTheme = (theme) => {
            const root = document.documentElement;

            if (theme === "dark") {
                root.classList.add("dark");
                root.setAttribute("data-theme", "dark");
            } else {
                root.classList.remove("dark");
                root.setAttribute("data-theme", "light");
            }

            if (typeof localStorage !== "undefined") {
                localStorage.setItem(STORAGE_KEY, theme);
            }

            updateButton(theme);
        };

        const updateButton = (theme) => {
            const btn = document.getElementById("theme-btn");
            if (!btn) return;

            const isDark = theme === "dark";
            btn.setAttribute("data-theme", theme);
            btn.setAttribute(
                "aria-label",
                isDark ? "切换为浅色模式" : "切换为深色模式",
            );
            btn.setAttribute("aria-pressed", isDark.toString());
        };

        // 从 DOM 读取当前主题（优先于 localStorage）
        const getThemeFromDOM = () => {
            const root = document.documentElement;
            const domTheme = root.getAttribute("data-theme");
            if (domTheme === "dark" || domTheme === "light") {
                return domTheme;
            }
            // 回退到 class
            if (root.classList.contains("dark")) {
                return "dark";
            }
            return getCurrentTheme(); // 最终回退
        };

        const toggleTheme = () => {
            const currentTheme = getThemeFromDOM();
            const newTheme = currentTheme === "dark" ? "light" : "dark";
            setTheme(newTheme);
        };

        const initThemeToggle = () => {
            const btn = document.getElementById("theme-btn");
            if (!btn) return;

            // 优先使用按钮已有的 data-theme 属性（由 BaseHead 设置）
            let currentTheme = btn.getAttribute("data-theme");

            if (
                !currentTheme ||
                (currentTheme !== "dark" && currentTheme !== "light")
            ) {
                // 回退到从 DOM 读取
                currentTheme = getThemeFromDOM();
            }

            updateButton(currentTheme);

            if (!btn.dataset.initialized) {
                btn.addEventListener("click", toggleTheme);

                btn.addEventListener("keydown", (e) => {
                    if (e.key === "Enter" || e.key === " ") {
                        e.preventDefault();
                        toggleTheme();
                    }
                });

                btn.dataset.initialized = "true";
            }
        };

        // 使用 window 属性跨页面持久化，防止 View Transitions 导致重复注册监听器
        if (!window.__themeInitialized) {
            window
                .matchMedia("(prefers-color-scheme: dark)")
                .addEventListener("change", (e) => {
                    if (!getStoredTheme()) {
                        setTheme(e.matches ? "dark" : "light");
                    }
                });
            window.__themeInitialized = true;
        }

        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", initThemeToggle);
        } else {
            initThemeToggle();
        }

        document.addEventListener("astro:page-load", initThemeToggle);
    })();
